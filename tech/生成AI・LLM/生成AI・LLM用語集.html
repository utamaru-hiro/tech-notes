<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>生成AI・LLM用語集</title>
  <style>
    :root {
      --bg: #f5efe3;
      --panel: rgba(255, 250, 242, 0.92);
      --text: #243126;
      --muted: #5a695c;
      --line: rgba(36, 49, 38, 0.14);
      --accent: #bb5a2a;
      --shadow: 0 18px 50px rgba(61, 42, 18, 0.12);
      --content-width: min(1520px, calc(100vw - 48px));
      --cat-1: #c85c3d;
      --cat-2: #4f7b66;
      --cat-3: #3f6e8c;
      --cat-4: #80613d;
      --cat-5: #7c4d6d;
      --cat-6: #556b2f;
      --cat-7: #566f91;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    @keyframes section-highlight {
      0%   { box-shadow: 0 0 0 4px rgba(187, 90, 42, 0.55); }
      60%  { box-shadow: 0 0 0 8px rgba(187, 90, 42, 0.2); }
      100% { box-shadow: var(--shadow); }
    }

    .section-flash {
      animation: section-highlight 0.9s ease forwards;
    }

    body {
      margin: 0;
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(200, 92, 61, 0.18), transparent 30%),
        radial-gradient(circle at top right, rgba(79, 123, 102, 0.16), transparent 28%),
        linear-gradient(180deg, #fcf7ef 0%, var(--bg) 100%);
    }

    header {
      padding: 48px 24px 28px;
    }

    .hero,
    .panel {
      max-width: var(--content-width);
      margin: 0 auto;
      background: var(--panel);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: 28px;
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 32px;
      position: relative;
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: auto -60px -70px auto;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(187, 90, 42, 0.2), transparent 70%);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 4vw, 3.5rem);
      letter-spacing: 0.03em;
    }

    .lead {
      max-width: 780px;
      margin: 0;
      color: var(--muted);
      line-height: 1.8;
      font-size: 1rem;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 14px;
      margin-top: 26px;
    }

    .summary-card {
      padding: 16px 18px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.64);
      border: 1px solid rgba(36, 49, 38, 0.08);
    }

    .summary-card strong {
      display: block;
      font-size: 1.4rem;
      margin-bottom: 4px;
    }

    main {
      max-width: var(--content-width);
      margin: 0 auto;
      padding: 0 24px 48px;
    }

    .panel {
      padding: 24px;
      margin-bottom: 24px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1.6fr 1fr;
      gap: 18px;
      align-items: center;
    }

    .toolbar h2,
    .section-header h2 {
      margin: 0 0 8px;
      font-size: 1.4rem;
    }

    .toolbar p,
    .section-header p,
    .legend {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .search-wrap {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: flex-end;
      flex-wrap: nowrap;
    }

    .toolbar-controls {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    @media (max-width: 640px) {
      .toolbar-controls {
        flex-direction: column;
        align-items: flex-start;
      }
    }

    .level-tabs {
      display: inline-flex;
      padding: 4px;
      border-radius: 999px;
      background: rgba(36, 49, 38, 0.07);
      border: 1px solid rgba(36, 49, 38, 0.08);
      gap: 4px;
    }

    .level-tab {
      appearance: none;
      border: 0;
      background: transparent;
      color: var(--muted);
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 0.94rem;
      font-weight: 700;
      cursor: pointer;
    }

    .level-tab.is-active {
      background: rgba(255, 255, 255, 0.92);
      color: var(--text);
      box-shadow: 0 8px 18px rgba(36, 49, 38, 0.08);
    }

    input[type="search"] {
      width: 160px;
      padding: 14px 16px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.9);
      font-size: 0.98rem;
      color: var(--text);
    }

    .count-pill {
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(36, 49, 38, 0.07);
      color: var(--muted);
      font-size: 0.9rem;
      white-space: nowrap;
    }

    .nav-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-top: 18px;
    }

    .nav-link {
      display: block;
      padding: 14px 16px;
      border-radius: 18px;
      text-decoration: none;
      color: #fff;
      font-weight: 700;
      box-shadow: 0 10px 22px rgba(36, 49, 38, 0.12);
    }

    .nav-link small {
      display: block;
      margin-top: 6px;
      font-weight: 500;
      opacity: 0.88;
    }

    .cat-1 { background: linear-gradient(135deg, var(--cat-1), #e88f62); }
    .cat-2 { background: linear-gradient(135deg, var(--cat-2), #73a087); }
    .cat-3 { background: linear-gradient(135deg, var(--cat-3), #6fa3bf); }
    .cat-4 { background: linear-gradient(135deg, var(--cat-4), #a9875e); }
    .cat-5 { background: linear-gradient(135deg, var(--cat-5), #a0688f); }
    .cat-6 { background: linear-gradient(135deg, var(--cat-6), #8ca54c); }
    .cat-7 { background: linear-gradient(135deg, var(--cat-7), #8398b3); }

    .concept-map {
      width: 100%;
      margin-top: 18px;
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(255,255,255,0.8), rgba(244, 235, 221, 0.88));
      border: 1px solid rgba(36, 49, 38, 0.08);
      padding: 16px;
    }

    .concept-map.is-empty {
      display: none;
    }

    section.category {
      scroll-margin-top: 24px;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: end;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--line);
    }

    .section-tag {
      padding: 8px 12px;
      border-radius: 999px;
      color: #fff;
      font-weight: 700;
      white-space: nowrap;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: rgba(255,255,255,0.68);
      border-radius: 18px;
      overflow: hidden;
    }

    thead th {
      text-align: left;
      font-size: 0.9rem;
      letter-spacing: 0.04em;
      color: var(--muted);
      padding: 14px 16px;
      background: rgba(36, 49, 38, 0.05);
      border-bottom: 1px solid var(--line);
    }

    tbody tr.term-row {
      transition: background 0.2s ease;
    }

    tbody tr.term-row:hover {
      background: rgba(255, 255, 255, 0.92);
    }

    td {
      padding: 14px 16px;
      border-bottom: 1px solid rgba(36, 49, 38, 0.08);
      vertical-align: top;
      line-height: 1.7;
    }

    td.term {
      width: 16%;
      font-weight: 700;
    }

    td.synopsis {
      width: 40%;
      color: var(--muted);
    }

    td.related {
      width: 20%;
      color: var(--muted);
    }

    td.related a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid rgba(187, 90, 42, 0.22);
    }

    td.related a:hover {
      border-bottom-color: rgba(187, 90, 42, 0.62);
    }

    .term-id-anchor {
      scroll-margin-top: 24px;
    }

    .level-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.76rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }
    .level-badge.badge-basic {
      background: rgba(173, 216, 230, 0.5);
      color: #2a6a8a;
    }
    .level-badge.badge-advanced {
      background: rgba(255, 182, 182, 0.5);
      color: #9a2a2a;
    }

    .detail-row {
      display: table-row;
      background: rgba(247, 242, 232, 0.72);
    }

    .detail-card {
      padding: 6px 2px 10px;
      color: var(--text);
    }

    .detail-card strong {
      display: block;
      margin: 0 0 4px;
      color: var(--muted);
      font-size: 0.82rem;
      letter-spacing: 0.03em;
    }

    .hidden {
      display: none !important;
    }

    footer {
      max-width: var(--content-width);
      margin: 0 auto;
      padding: 0 24px 48px;
      color: var(--muted);
      line-height: 1.8;
    }

    .toolbar-controls.is-floating {
      position: fixed;
      top: 16px;
      right: 32px;
      z-index: 90;
      background: rgba(255, 250, 242, 0.95);
      padding: 12px 16px;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(61, 42, 18, 0.18);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.7);
      opacity: 0;
      transform: translateY(-8px);
      transition: opacity 0.25s ease, transform 0.25s ease;
      pointer-events: none;
    }

    .toolbar-controls.is-floating.is-visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    #back-to-top {
      position: fixed;
      bottom: 32px;
      right: 32px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 1.3rem;
      line-height: 1;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(61, 42, 18, 0.22);
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.25s ease, transform 0.25s ease;
      pointer-events: none;
      z-index: 100;
    }

    #back-to-top.is-visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    #back-to-top:hover {
      background: #a04820;
    }

    @media (max-width: 640px) {
      header {
        padding: 24px 16px 18px;
      }

      main,
      footer {
        padding-left: 16px;
        padding-right: 16px;
      }

      .hero,
      .panel {
        border-radius: 22px;
      }

      .toolbar {
        grid-template-columns: 1fr;
      }

      .search-wrap {
        justify-content: flex-start;
      }

      .section-header {
        flex-direction: column;
        align-items: flex-start;
      }

      table,
      thead,
      tbody,
      th,
      td,
      tr {
        display: block;
      }

      thead {
        display: none;
      }

      tbody tr.term-row {
        border-bottom: 1px solid var(--line);
      }

      td {
        border-bottom: none;
        padding: 8px 14px;
        width: 100%;
      }

      td.term,
      td.synopsis,
      td.related {
        width: auto;
        max-width: none;
      }

      td.term::before,
      td.synopsis::before,
      td.related::before {
        display: block;
        font-size: 0.8rem;
        color: var(--muted);
        letter-spacing: 0.03em;
        margin-bottom: 4px;
      }

      td.term::before { content: "用語"; }
      td.synopsis::before { content: "まず押さえること"; }
      td.related::before { content: "関連用語"; }

      .detail-row {
        display: block;
        padding: 0 14px 12px;
      }

      .detail-row td {
        padding: 0;
        width: 100%;
      }
    }

    @media (max-width: 480px) {
      header { padding: 14px 12px 12px; }
      main, footer { padding-left: 12px; padding-right: 12px; }
      .hero { padding: 20px 16px; }
      .panel { padding: 14px; }
      .search-wrap { flex-wrap: wrap; gap: 8px; }
      input[type="search"] { flex: 1; min-width: 0; width: auto; }
      .count-pill { width: 100%; text-align: center; }
      .toolbar-controls.is-floating { top: 8px; left: 8px; right: 8px; flex-direction: column; gap: 8px; }
      #back-to-top { right: 16px; bottom: 20px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="hero">
      <h1 id="page-title"></h1>
      <p id="page-lead" class="lead"></p>
      <div class="summary">
        <div class="summary-card">
          <strong id="category-count"></strong>
          <span>カテゴリー数</span>
        </div>
        <div class="summary-card">
          <strong id="term-count"></strong>
          <span>全用語数</span>
        </div>
      </div>
    </div>
  </header>

  <main>
    <section class="panel">
      <div class="toolbar">
        <div>
          <h2>カテゴリー一覧</h2>
          <p id="learning-order"></p>
        </div>
        <div id="toolbar-controls" class="toolbar-controls">
          <div class="level-tabs" role="tablist" aria-label="用語のレベル切り替え">
            <button class="level-tab" type="button" role="tab" aria-selected="false" data-level-filter="basic">基礎</button>
            <button class="level-tab" type="button" role="tab" aria-selected="false" data-level-filter="advanced">発展</button>
            <button class="level-tab is-active" type="button" role="tab" aria-selected="true" data-level-filter="all">すべて</button>
          </div>
          <div class="search-wrap">
            <label for="term-search" class="hidden">用語を検索</label>
            <input id="term-search" type="search" placeholder="検索">
            <span class="count-pill"><span id="visible-count"></span> / <span id="total-visible-count"></span> 語を表示</span>
          </div>
        </div>
        <div id="toolbar-placeholder" style="display:none"></div>
      </div>
      <div id="nav-grid" class="nav-grid"></div>
      <div id="concept-map" class="concept-map is-empty"></div>
    </section>

    <div id="category-sections"></div>
  </main>

  <footer>
    関連用語をクリックすると、その用語の場所へ移動できます。説明は各用語の直下に常時表示される前提です。必要に応じて図や補足を各用語の説明ブロックへ追加してください。
  </footer>

  <button id="back-to-top" aria-label="ページトップへ戻る">↑</button>

  <script src="./生成AI・LLM用語集.data.js"></script>
  <script>
    const searchInput = document.getElementById('term-search');
    const visibleCount = document.getElementById('visible-count');
    const totalVisibleCount = document.getElementById('total-visible-count');
    const levelTabs = Array.from(document.querySelectorAll('.level-tab'));
    let activeLevel = 'basic';

    const slugify = (text) => text
      .trim()
      .toLowerCase()
      .replace(/・/g, '-')
      .replace(/\s+/g, '-')
      .replace(/[^a-z0-9\u3040-\u30ff\u3400-\u9fff-]/g, '');

    const normalizeTerm = (text) => text.replace(/\s+/g, '').replace(/・/g, '').trim();

    const allTerms = glossaryData.categories.flatMap((category) => category.terms);
    const termIndex = new Map();

    document.title = glossaryData.title;
    document.getElementById('page-title').textContent = glossaryData.title;
    document.getElementById('page-lead').textContent = glossaryData.lead || '';
    document.getElementById('learning-order').textContent = glossaryData.learningOrder || '';
    document.getElementById('category-count').textContent = String(glossaryData.categories.length);
    document.getElementById('term-count').textContent = String(allTerms.length);
    totalVisibleCount.textContent = String(allTerms.length);

    const conceptMap = document.getElementById('concept-map');
    if (glossaryData.conceptMapSvg && glossaryData.conceptMapSvg.trim()) {
      conceptMap.classList.remove('is-empty');
      conceptMap.innerHTML = glossaryData.conceptMapSvg;
    }

    const navGrid = document.getElementById('nav-grid');
    glossaryData.categories.forEach((category, index) => {
      const navLink = document.createElement('a');
      navLink.className = `nav-link ${category.colorClass || `cat-${(index % 7) + 1}`}`;
      navLink.href = `#${category.id}`;
      navLink.innerHTML = `${index + 1}. ${category.name}<small>${category.shortDescription || ''}</small>`;
      navLink.addEventListener('click', () => {
        const target = document.getElementById(category.id);
        if (!target) return;
        target.classList.remove('section-flash');
        requestAnimationFrame(() => {
          requestAnimationFrame(() => target.classList.add('section-flash'));
        });
        target.addEventListener('animationend', () => target.classList.remove('section-flash'), { once: true });
      });
      navGrid.appendChild(navLink);
    });

    const categorySections = document.getElementById('category-sections');
    glossaryData.categories.forEach((category, index) => {
      const section = document.createElement('section');
      section.id = category.id;
      section.className = 'panel category';
      section.dataset.category = category.name;

      const colorClass = category.colorClass || `cat-${(index % 7) + 1}`;
      const termsHtml = category.terms.map((term) => {
        const termId = `term-${slugify(term.name)}`;
        termIndex.set(normalizeTerm(term.name), { id: termId, level: term.level || 'basic' });
        return `
          <tr class="term-row term-id-anchor" id="${termId}" data-level="${term.level || 'basic'}" data-term="${term.name}">
            <td class="term">
              ${term.name}
              <div class="level-badge ${term.level === 'advanced' ? 'badge-advanced' : 'badge-basic'}">${term.level === 'advanced' ? '発展' : '基礎'}</div>
            </td>
            <td class="synopsis">${term.synopsis}</td>
            <td class="related">${term.related.map((item) => `<span data-related-term="${item}">${item}</span>`).join('、')}</td>
          </tr>
          <tr class="detail-row" data-level="${term.level || 'basic'}">
            <td colspan="3">
              <div class="detail-card">
                <strong>説明</strong>
                ${term.description}
              </div>
            </td>
          </tr>
        `;
      }).join('');

      section.innerHTML = `
        <div class="section-header">
          <div>
            <h2>${index + 1}. ${category.name}</h2>
            <p>${category.intro || ''}</p>
          </div>
          <span class="section-tag ${colorClass}">${category.tag || ''}</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>用語</th>
                <th>まず押さえること</th>
                <th>関連用語</th>
              </tr>
            </thead>
            <tbody>
              ${termsHtml}
            </tbody>
          </table>
        </div>
      `;

      categorySections.appendChild(section);
    });

    const termRows = Array.from(document.querySelectorAll('.term-row'));
    termRows.forEach((row) => {
      row._detailRow = row.nextElementSibling;
      const relatedCell = row.querySelector('.related');
      const parts = Array.from(relatedCell.querySelectorAll('[data-related-term]'));
      relatedCell.textContent = '';
      parts.forEach((part, index) => {
        const relatedTerm = part.dataset.relatedTerm;
        const match = termIndex.get(normalizeTerm(relatedTerm));
        if (match) {
          const link = document.createElement('a');
          link.href = `#${match.id}`;
          link.textContent = relatedTerm;
          link.dataset.targetLevel = match.level;
          relatedCell.appendChild(link);
        } else {
          relatedCell.appendChild(document.createTextNode(relatedTerm));
        }
        if (index < parts.length - 1) {
          relatedCell.appendChild(document.createTextNode('、'));
        }
      });
    });

    const updateCount = () => {
      const visibleRows = termRows.filter((row) => !row.classList.contains('hidden'));
      visibleCount.textContent = String(visibleRows.length);
    };

    const setActiveTab = (level) => {
      activeLevel = level;
      levelTabs.forEach((tab) => {
        const isActive = tab.dataset.levelFilter === level;
        tab.classList.toggle('is-active', isActive);
        tab.setAttribute('aria-selected', String(isActive));
      });
    };

    const applyFilters = () => {
      const query = searchInput.value.trim().toLowerCase();
      termRows.forEach((row) => {
        const levelMatched = activeLevel === 'all' || row.dataset.level === activeLevel;
        const queryMatched = row.textContent.toLowerCase().includes(query) || row._detailRow.textContent.toLowerCase().includes(query);
        const visible = levelMatched && queryMatched;
        row.classList.toggle('hidden', !visible);
        if (row._detailRow) {
          row._detailRow.classList.toggle('hidden', !visible);
        }
      });

      document.querySelectorAll('section.category').forEach((section) => {
        const hasVisibleRow = Array.from(section.querySelectorAll('.term-row')).some((row) => !row.classList.contains('hidden'));
        section.classList.toggle('hidden', !hasVisibleRow);
      });

      updateCount();
    };

    levelTabs.forEach((tab) => {
      tab.addEventListener('click', () => {
        setActiveTab(tab.dataset.levelFilter);
        applyFilters();
      });
    });

    document.addEventListener('click', (event) => {
      const link = event.target.closest('.related a');
      if (!link) {
        return;
      }
      const targetLevel = link.dataset.targetLevel;
      if (targetLevel && activeLevel !== 'all' && activeLevel !== targetLevel) {
        setActiveTab(targetLevel);
        applyFilters();
      }
    });

    let isComposing = false;
    searchInput.addEventListener('compositionstart', () => { isComposing = true; });
    searchInput.addEventListener('compositionend', () => { isComposing = false; applyFilters(); });
    searchInput.addEventListener('input', () => { if (!isComposing) applyFilters(); });

    setActiveTab('all');
    applyFilters();

    const toolbarControls = document.getElementById('toolbar-controls');
    const toolbarPlaceholder = document.getElementById('toolbar-placeholder');
    const toolbarPanel = document.querySelector('section.panel');

    const updateFloating = () => {
      const panelBottom = toolbarPanel.getBoundingClientRect().bottom;
      if (panelBottom < 0) {
        if (!toolbarControls.classList.contains('is-floating')) {
          toolbarPlaceholder.style.height = toolbarControls.offsetHeight + 'px';
          toolbarPlaceholder.style.display = 'block';
          document.body.appendChild(toolbarControls);
          toolbarControls.classList.add('is-floating');
          requestAnimationFrame(() => toolbarControls.classList.add('is-visible'));
        }
      } else {
        if (toolbarControls.classList.contains('is-floating')) {
          toolbarControls.classList.remove('is-visible');
          setTimeout(() => {
            toolbarControls.classList.remove('is-floating');
            toolbarPlaceholder.parentElement.insertBefore(toolbarControls, toolbarPlaceholder);
            toolbarPlaceholder.style.display = 'none';
          }, 260);
        }
      }
    };

    window.addEventListener('scroll', updateFloating, { passive: true });

    const backToTop = document.getElementById('back-to-top');
    window.addEventListener('scroll', () => {
      backToTop.classList.toggle('is-visible', window.scrollY > 300);
    }, { passive: true });
    backToTop.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  </script>
</body>
</html>
