<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="t d">
  <title id="t">量子影響ヒートマップ</title>
  <desc id="d">RSA ECC 対称鍵 ハッシュに対する量子計算影響度を比較する図。</desc>
  <defs>
    <style>
      .bg{fill:#f9f2e4}.ttl{font:700 28px 'Hiragino Sans','Yu Gothic',sans-serif;fill:#3d2d00}
      .th{font:700 17px 'Hiragino Sans','Yu Gothic',sans-serif;fill:#3d2d00}.td{font:500 15px 'Hiragino Sans','Yu Gothic',sans-serif;fill:#4d4638}
      .high{fill:#f8cfcf}.mid{fill:#fde9c9}.low{fill:#dff2df}
    </style>
  </defs>
  <rect class="bg" width="1200" height="560"/>
  <text class="ttl" x="48" y="58">量子時代の影響度マップ</text>

  <rect x="90" y="110" width="1020" height="360" fill="#fffdf8" stroke="#c9a24a" stroke-width="2" rx="12"/>
  <text class="th" x="130" y="155">方式カテゴリ</text>
  <text class="th" x="420" y="155">影響度</text>
  <text class="th" x="620" y="155">対策方向</text>

  <rect class="high" x="120" y="190" width="960" height="60" rx="8"/>
  <text class="td" x="140" y="227">RSA / ECC</text>
  <text class="td" x="420" y="227">高</text>
  <text class="td" x="620" y="227">耐量子方式へ段階移行</text>

  <rect class="mid" x="120" y="270" width="960" height="60" rx="8"/>
  <text class="td" x="140" y="307">対称鍵暗号</text>
  <text class="td" x="420" y="307">中</text>
  <text class="td" x="620" y="307">鍵長引き上げと監査継続</text>

  <rect class="low" x="120" y="350" width="960" height="60" rx="8"/>
  <text class="td" x="140" y="387">ハッシュ関数</text>
  <text class="td" x="420" y="387">低〜中</text>
  <text class="td" x="620" y="387">出力長見直しと用途再確認</text>

  <text class="td" x="92" y="525">影響度は一律ではないため、方式別に優先順位を付けて移行計画を立てることが重要。</text>
</svg>
