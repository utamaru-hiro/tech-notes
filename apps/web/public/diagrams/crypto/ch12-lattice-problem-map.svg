<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="t d">
  <title id="t">格子問題マップ</title>
  <desc id="d">LWE Ring-LWE SIS NTRUの関係と主な用途を示す概念図。</desc>
  <defs>
    <style>
      .bg{fill:#f9f2e4}.ttl{font:700 28px 'Hiragino Sans','Yu Gothic',sans-serif;fill:#3d2d00}
      .box{fill:#fffdf8;stroke:#c9a24a;stroke-width:2}.h{font:700 16px 'Hiragino Sans','Yu Gothic',sans-serif;fill:#3d2d00}.b{font:500 14px 'Hiragino Sans','Yu Gothic',sans-serif;fill:#4d4638}
    </style>
  </defs>
  <rect class="bg" width="1200" height="560"/>
  <text class="ttl" x="48" y="58">耐量子基盤となる格子問題</text>

  <rect class="box" x="120" y="150" width="220" height="120" rx="12"/>
  <text class="h" x="205" y="205">LWE</text>
  <text class="b" x="165" y="235">一般的基盤問題</text>

  <rect class="box" x="380" y="150" width="220" height="120" rx="12"/>
  <text class="h" x="445" y="205">Ring-LWE</text>
  <text class="b" x="430" y="235">効率向上設計</text>

  <rect class="box" x="640" y="150" width="220" height="120" rx="12"/>
  <text class="h" x="725" y="205">SIS</text>
  <text class="b" x="690" y="235">署名系で活用</text>

  <rect class="box" x="900" y="150" width="220" height="120" rx="12"/>
  <text class="h" x="975" y="205">NTRU</text>
  <text class="b" x="960" y="235">構造系問題</text>

  <rect class="box" x="260" y="330" width="300" height="130" rx="12"/>
  <text class="h" x="340" y="380">鍵共有系用途</text>
  <text class="b" x="300" y="410">KEM設計の基盤</text>

  <rect class="box" x="660" y="330" width="300" height="130" rx="12"/>
  <text class="h" x="740" y="380">署名系用途</text>
  <text class="b" x="700" y="410">署名方式の安全根拠</text>

  <text class="b" x="92" y="525">問題設定ごとに実装効率と安全性評価の観点が異なるため、用途軸で比較することが重要。</text>
</svg>
