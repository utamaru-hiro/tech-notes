<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">平文から暗号文へのパイプライン図</title>
  <desc id="desc">平文を暗号化して暗号文を作り、復号して平文を復元する基本フロー。</desc>
  <defs>
    <linearGradient id="bg2" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fffaf0"/>
      <stop offset="100%" stop-color="#f2e8d6"/>
    </linearGradient>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7a5c00"/>
    </marker>
    <style>
      .title { font: 700 28px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #3d2d00; }
      .head { font: 700 22px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #3d2d00; }
      .text { font: 500 17px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #4d4638; }
      .cap { font: 500 16px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #5a695c; }
      .node { fill: #fffdf8; stroke: #c9a24a; stroke-width: 2; rx: 16; }
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="420" fill="url(#bg2)"/>
  <text x="56" y="58" class="title">平文と暗号文の最小パイプライン</text>

  <rect class="node" x="56" y="132" width="220" height="120"/>
  <text x="136" y="188" text-anchor="middle" class="head">平文</text>
  <text x="166" y="216" text-anchor="middle" class="text">保護対象データ</text>

  <rect class="node" x="332" y="116" width="260" height="152"/>
  <text x="462" y="168" text-anchor="middle" class="head">暗号化処理</text>
  <text x="462" y="202" text-anchor="middle" class="text">入力: 平文 + 鍵 + ノンス</text>
  <text x="462" y="230" text-anchor="middle" class="text">出力: 暗号文</text>

  <rect class="node" x="648" y="132" width="220" height="120"/>
  <text x="758" y="188" text-anchor="middle" class="head">暗号文</text>
  <text x="758" y="216" text-anchor="middle" class="text">第三者には読めない</text>

  <rect class="node" x="924" y="116" width="220" height="152"/>
  <text x="1034" y="168" text-anchor="middle" class="head">復号処理</text>
  <text x="1034" y="202" text-anchor="middle" class="text">入力: 暗号文 + 鍵 + ノンス</text>
  <text x="1034" y="230" text-anchor="middle" class="text">出力: 平文</text>

  <line x1="276" y1="192" x2="324" y2="192" stroke="#7a5c00" stroke-width="3" marker-end="url(#arrow2)"/>
  <line x1="592" y1="192" x2="640" y2="192" stroke="#7a5c00" stroke-width="3" marker-end="url(#arrow2)"/>
  <line x1="868" y1="192" x2="916" y2="192" stroke="#7a5c00" stroke-width="3" marker-end="url(#arrow2)"/>

  <text x="56" y="364" class="cap">ポイント: 正しい鍵とパラメータがそろって初めて復号が成立する。鍵管理は処理フローの中心要件。</text>
</svg>
