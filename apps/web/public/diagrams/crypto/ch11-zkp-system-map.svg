<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="t d">
  <title id="t">ゼロ知識証明の基本関係図</title>
  <desc id="d">証明者、検証者、秘密情報、証明データの関係を示す概念図。</desc>
  <defs>
    <style>
      .bg{fill:#f9f2e4}.ttl{font:700 28px 'Hiragino Sans','Yu Gothic',sans-serif;fill:#3d2d00}
      .box{fill:#fffdf8;stroke:#c9a24a;stroke-width:2}.sec{fill:#eef4ff;stroke:#6f91c8;stroke-width:2}
      .h{font:700 17px 'Hiragino Sans','Yu Gothic',sans-serif;fill:#3d2d00}.b{font:500 14px 'Hiragino Sans','Yu Gothic',sans-serif;fill:#4d4638}
    </style>
  </defs>
  <rect class="bg" width="1200" height="560"/>
  <text class="ttl" x="48" y="58">ゼロ知識証明の構成</text>

  <rect class="box" x="110" y="170" width="290" height="220" rx="12"/>
  <text class="h" x="160" y="220">証明者</text>
  <text class="b" x="145" y="250">秘密入力を保持</text>
  <text class="b" x="145" y="278">証明を生成</text>

  <rect class="sec" x="460" y="120" width="280" height="140" rx="12"/>
  <text class="h" x="520" y="170">秘密情報</text>
  <text class="b" x="500" y="198">外部には非開示</text>

  <rect class="box" x="800" y="170" width="290" height="220" rx="12"/>
  <text class="h" x="855" y="220">検証者</text>
  <text class="b" x="835" y="250">証明のみ検証</text>
  <text class="b" x="835" y="278">秘密は受け取らない</text>

  <text class="b" x="90" y="525">完全性、健全性、ゼロ知識性を同時に満たすことで、秘密を明かさず検証可能性を確保できる。</text>
</svg>
