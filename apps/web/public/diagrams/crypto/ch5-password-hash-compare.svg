<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="t d">
  <title id="t">主要パスワードハッシュ方式比較</title>
  <desc id="d">Argon2、scrypt、bcrypt、PBKDF2の特徴を攻撃耐性と運用性で比較。</desc>
  <defs>
    <style>
      .bg{fill:#f9f2e4}.title{font:700 28px 'Hiragino Sans','Yu Gothic',sans-serif;fill:#3d2d00}
      .th{font:700 17px 'Hiragino Sans','Yu Gothic',sans-serif;fill:#3d2d00}
      .td{font:500 15px 'Hiragino Sans','Yu Gothic',sans-serif;fill:#4d4638}
    </style>
  </defs>
  <rect class="bg" width="1200" height="520"/>
  <text class="title" x="48" y="58">パスワードハッシュ方式比較（実務観点）</text>

  <rect x="70" y="95" width="1060" height="360" fill="#fffdf8" stroke="#c9a24a" stroke-width="2" rx="12"/>

  <text class="th" x="100" y="138">方式</text>
  <text class="th" x="280" y="138">メモリ硬さ</text>
  <text class="th" x="470" y="138">調整軸</text>
  <text class="th" x="670" y="138">互換性</text>
  <text class="th" x="840" y="138">採用メモ</text>

  <text class="td" x="100" y="188">Argon2</text>
  <text class="td" x="280" y="188">高い</text>
  <text class="td" x="470" y="188">時間/メモリ/並列度</text>
  <text class="td" x="670" y="188">中</text>
  <text class="td" x="840" y="188">新規採用の第一候補</text>

  <text class="td" x="100" y="238">scrypt</text>
  <text class="td" x="280" y="238">高い</text>
  <text class="td" x="470" y="238">CPU/メモリ係数</text>
  <text class="td" x="670" y="238">中</text>
  <text class="td" x="840" y="238">既存資産で有力</text>

  <text class="td" x="100" y="288">bcrypt</text>
  <text class="td" x="280" y="288">限定的</text>
  <text class="td" x="470" y="288">cost</text>
  <text class="td" x="670" y="288">高</text>
  <text class="td" x="840" y="288">実績豊富、移行計画が鍵</text>

  <text class="td" x="100" y="338">PBKDF2</text>
  <text class="td" x="280" y="338">低い</text>
  <text class="td" x="470" y="338">反復回数</text>
  <text class="td" x="670" y="338">非常に高</text>
  <text class="td" x="840" y="338">互換重視時に選択</text>

  <text class="td" x="90" y="430">方式名だけでなく、パラメータ更新運用と再ハッシュ導線を設計して初めて防御力が維持される。</text>
</svg>
