<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="t d">
  <title id="t">信頼連鎖と事故伝播ポイント</title>
  <desc id="d">ルートCAから末端証明書までの信頼連鎖における主なリスク地点を示す図。</desc>
  <defs>
    <style>
      .bg{fill:#f9f2e4}.title{font:700 28px 'Hiragino Sans','Yu Gothic',sans-serif;fill:#3d2d00}
      .node{fill:#fffdf8;stroke:#c9a24a;stroke-width:2}.risk{fill:#fdecec;stroke:#d88989;stroke-width:2}
      .h{font:700 17px 'Hiragino Sans','Yu Gothic',sans-serif;fill:#3d2d00}.b{font:500 14px 'Hiragino Sans','Yu Gothic',sans-serif;fill:#4d4638}
      .line{stroke:#a67a19;stroke-width:3;fill:none;marker-end:url(#m)}
    </style>
    <marker id="m" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#a67a19"/>
    </marker>
  </defs>

  <rect class="bg" width="1200" height="560"/>
  <text class="title" x="48" y="58">PKI信頼連鎖の破綻リスク</text>

  <rect class="node" x="120" y="150" width="220" height="110" rx="12"/>
  <text class="h" x="165" y="196">ルートCA</text>

  <rect class="node" x="470" y="150" width="240" height="110" rx="12"/>
  <text class="h" x="525" y="196">中間CA</text>

  <rect class="node" x="860" y="150" width="240" height="110" rx="12"/>
  <text class="h" x="910" y="196">サーバ証明書</text>

  <path class="line" d="M340 205 H470"/>
  <path class="line" d="M710 205 H860"/>

  <rect class="risk" x="100" y="320" width="260" height="160" rx="12"/>
  <text class="h" x="130" y="365">リスク1</text>
  <text class="b" x="130" y="392">ルート鍵事故</text>
  <text class="b" x="130" y="418">影響範囲が最大</text>

  <rect class="risk" x="450" y="320" width="280" height="160" rx="12"/>
  <text class="h" x="480" y="365">リスク2</text>
  <text class="b" x="480" y="392">中間CA誤発行/漏えい</text>
  <text class="b" x="480" y="418">大規模連鎖障害</text>

  <rect class="risk" x="840" y="320" width="280" height="160" rx="12"/>
  <text class="h" x="870" y="365">リスク3</text>
  <text class="b" x="870" y="392">失効配布遅延</text>
  <text class="b" x="870" y="418">危険証明書を受理</text>

  <text class="b" x="102" y="525">運用では、検知・失効・差し替えまでの時間目標を決め、監査ログで追跡可能な復旧手順を準備する。</text>
</svg>
