<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="t d">
  <title id="t">秘密分散しきい値モデル</title>
  <desc id="d">n個中k個で秘密復元するしきい値モデルを示す図。</desc>
  <defs>
    <style>
      .bg{fill:#f9f2e4}.ttl{font:700 28px 'Hiragino Sans','Yu Gothic',sans-serif;fill:#3d2d00}
      .box{fill:#fffdf8;stroke:#c9a24a;stroke-width:2}.ok{fill:#edf8ed;stroke:#78a878;stroke-width:2}.ng{fill:#fdecec;stroke:#d88989;stroke-width:2}
      .h{font:700 16px 'Hiragino Sans','Yu Gothic',sans-serif;fill:#3d2d00}.b{font:500 14px 'Hiragino Sans','Yu Gothic',sans-serif;fill:#4d4638}
    </style>
  </defs>
  <rect class="bg" width="1200" height="560"/>
  <text class="ttl" x="48" y="58">n-of-k 秘密分散モデル</text>

  <rect class="box" x="120" y="140" width="280" height="300" rx="12"/>
  <text class="h" x="170" y="185">分散断片</text>
  <text class="b" x="155" y="220">Share1</text>
  <text class="b" x="155" y="250">Share2</text>
  <text class="b" x="155" y="280">Share3</text>
  <text class="b" x="155" y="310">Share4</text>
  <text class="b" x="155" y="340">Share5</text>

  <rect class="ok" x="460" y="170" width="280" height="120" rx="12"/>
  <text class="h" x="525" y="220">k個以上</text>
  <text class="b" x="500" y="248">復元可能</text>

  <rect class="ng" x="460" y="320" width="280" height="120" rx="12"/>
  <text class="h" x="540" y="370">k未満</text>
  <text class="b" x="500" y="398">復元不可</text>

  <rect class="box" x="820" y="230" width="260" height="120" rx="12"/>
  <text class="h" x="890" y="280">秘密</text>
  <text class="b" x="860" y="308">可用性と漏えい耐性</text>

  <text class="b" x="92" y="525">しきい値設計は可用性と漏えい耐性のバランス調整であり、復元手順の運用設計が不可欠。</text>
</svg>
