<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="920" viewBox="0 0 1280 920" role="img" aria-labelledby="title desc">
  <title id="title">TLS 1.3 Handshake Sequence</title>
  <desc id="desc">Client and Server message flow for a typical TLS 1.3 handshake.</desc>

  <defs>
    <marker id="arrow-right" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f172a"/>
    </marker>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 16px Arial, sans-serif; fill: #334155; }
      .lane-title { font: 700 20px Arial, sans-serif; fill: #0f172a; }
      .msg { font: 600 15px Arial, sans-serif; fill: #0f172a; }
      .note-title { font: 700 14px Arial, sans-serif; fill: #0f172a; }
      .note { font: 400 13px Arial, sans-serif; fill: #1e293b; }
      .legend { font: 600 13px Arial, sans-serif; fill: #334155; }
    </style>
  </defs>

  <rect x="0" y="0" width="1280" height="920" fill="#f8fafc"/>

  <text x="56" y="62" class="title">TLS 1.3 ハンドシェイク（標準的なサーバ認証）</text>
  <text x="56" y="90" class="subtitle">ClientHello から Finished までの時系列。実装により 0-RTT, PSK, 証明書省略などの分岐あり。</text>

  <rect x="70" y="120" width="490" height="740" rx="16" fill="#e2e8f0"/>
  <rect x="720" y="120" width="490" height="740" rx="16" fill="#dbeafe"/>

  <text x="90" y="162" class="lane-title">Client</text>
  <text x="740" y="162" class="lane-title">Server</text>

  <line x1="315" y1="180" x2="315" y2="840" stroke="#64748b" stroke-width="2" stroke-dasharray="6 6"/>
  <line x1="965" y1="180" x2="965" y2="840" stroke="#64748b" stroke-width="2" stroke-dasharray="6 6"/>

  <line x1="335" y1="230" x2="945" y2="230" stroke="#0f172a" stroke-width="2.5" marker-end="url(#arrow-right)"/>
  <text x="420" y="218" class="msg">1) ClientHello + key_share + supported_versions</text>

  <line x1="945" y1="300" x2="335" y2="300" stroke="#0f172a" stroke-width="2.5" marker-end="url(#arrow-right)"/>
  <text x="500" y="288" class="msg">2) ServerHello + key_share + selected_version</text>

  <line x1="945" y1="360" x2="335" y2="360" stroke="#0f172a" stroke-width="2.5" marker-end="url(#arrow-right)"/>
  <text x="600" y="348" class="msg">3) EncryptedExtensions</text>

  <line x1="945" y1="420" x2="335" y2="420" stroke="#0f172a" stroke-width="2.5" marker-end="url(#arrow-right)"/>
  <text x="605" y="408" class="msg">4) Certificate</text>

  <line x1="945" y1="480" x2="335" y2="480" stroke="#0f172a" stroke-width="2.5" marker-end="url(#arrow-right)"/>
  <text x="580" y="468" class="msg">5) CertificateVerify</text>

  <line x1="945" y1="540" x2="335" y2="540" stroke="#0f172a" stroke-width="2.5" marker-end="url(#arrow-right)"/>
  <text x="635" y="528" class="msg">6) Finished</text>

  <line x1="335" y1="600" x2="945" y2="600" stroke="#0f172a" stroke-width="2.5" marker-end="url(#arrow-right)"/>
  <text x="635" y="588" class="msg">7) Finished</text>

  <line x1="335" y1="680" x2="945" y2="680" stroke="#065f46" stroke-width="3" marker-end="url(#arrow-right)"/>
  <text x="560" y="666" class="msg" fill="#065f46">8) Application Data (1-RTT)</text>

  <line x1="945" y1="730" x2="335" y2="730" stroke="#065f46" stroke-width="3" marker-end="url(#arrow-right)"/>
  <text x="560" y="716" class="msg" fill="#065f46">9) Application Data (1-RTT)</text>

  <rect x="60" y="760" width="540" height="90" rx="10" fill="#fff7ed" stroke="#fb923c" stroke-width="1.5"/>
  <text x="80" y="788" class="note-title">注意ポイント</text>
  <text x="80" y="812" class="note">・ServerHello 以降は鍵スケジュールが確定し、ハンドシェイク暗号化が開始される。</text>
  <text x="80" y="832" class="note">・証明書検証と Finished 検証の両方が成功して初めて相互の真正性を確認できる。</text>

  <rect x="720" y="760" width="490" height="90" rx="10" fill="#ecfeff" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="740" y="788" class="note-title">実装での分岐</text>
  <text x="740" y="812" class="note">・PSK 再開時は Certificate / CertificateVerify が省略される場合がある。</text>
  <text x="740" y="832" class="note">・0-RTT を使う場合はリプレイ対策の章とセットで解説する。</text>

  <rect x="60" y="878" width="18" height="12" fill="#0f172a"/>
  <text x="86" y="889" class="legend">ハンドシェイクメッセージ</text>
  <rect x="300" y="878" width="18" height="12" fill="#065f46"/>
  <text x="326" y="889" class="legend">アプリケーションデータ</text>
</svg>
