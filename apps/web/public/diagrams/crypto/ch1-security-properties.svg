<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">機密性・完全性・真正性の対応図</title>
  <desc id="desc">暗号が守る三つの性質と代表的な対策の関係を示す図。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fff9ed"/>
      <stop offset="100%" stop-color="#f5ead1"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7a5c00"/>
    </marker>
    <style>
      .title { font: 700 28px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #3d2d00; }
      .h { font: 700 22px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #3d2d00; }
      .t { font: 500 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #4d4638; }
      .cap { font: 500 16px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #5a695c; }
      .box { fill: #fffdf8; stroke: #c9a24a; stroke-width: 2; rx: 18; }
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="520" fill="url(#bg)"/>
  <text x="56" y="56" class="title">暗号が守る3つの性質と代表対策</text>

  <rect class="box" x="56" y="106" width="318" height="122"/>
  <text x="84" y="156" class="h">機密性</text>
  <text x="84" y="188" class="t">第三者に内容を読ませない</text>

  <rect class="box" x="56" y="248" width="318" height="122"/>
  <text x="84" y="298" class="h">完全性</text>
  <text x="84" y="330" class="t">途中改ざんを検知する</text>

  <rect class="box" x="56" y="390" width="318" height="94"/>
  <text x="84" y="438" class="h">真正性</text>
  <text x="84" y="468" class="t">送信者の正当性を確認する</text>

  <rect class="box" x="522" y="142" width="618" height="90"/>
  <text x="552" y="198" class="h">対策: 暗号化（共通鍵暗号・公開鍵暗号）</text>

  <rect class="box" x="522" y="268" width="618" height="90"/>
  <text x="552" y="324" class="h">対策: MAC / AEAD で改ざん検知</text>

  <rect class="box" x="522" y="394" width="618" height="90"/>
  <text x="552" y="450" class="h">対策: 電子署名・証明書検証</text>

  <line x1="376" y1="166" x2="514" y2="186" stroke="#7a5c00" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="376" y1="308" x2="514" y2="312" stroke="#7a5c00" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="376" y1="438" x2="514" y2="438" stroke="#7a5c00" stroke-width="3" marker-end="url(#arrow)"/>

  <text x="56" y="505" class="cap">ポイント: 暗号化だけでは十分ではなく、完全性と真正性の検証まで含めて設計する。</text>
</svg>
