<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="t d">
  <title id="t">認証情報攻撃フロー図</title>
  <desc id="d">漏えい後のオフライン攻撃とオンライン攻撃の流れを示す図。</desc>
  <defs>
    <style>
      .bg{fill:#f9f2e4}.ttl{font:700 28px 'Hiragino Sans','Yu Gothic',sans-serif;fill:#3d2d00}
      .box{fill:#fffdf8;stroke:#c9a24a;stroke-width:2}.h{font:700 16px 'Hiragino Sans','Yu Gothic',sans-serif;fill:#3d2d00}.b{font:500 14px 'Hiragino Sans','Yu Gothic',sans-serif;fill:#4d4638}
    </style>
  </defs>
  <rect class="bg" width="1200" height="560"/>
  <text class="ttl" x="48" y="58">認証情報攻撃の典型フロー</text>

  <rect class="box" x="90" y="140" width="480" height="320" rx="14"/>
  <text class="h" x="130" y="185">オフライン攻撃</text>
  <text class="b" x="130" y="220">1. 漏えいハッシュ入手</text>
  <text class="b" x="130" y="250">2. 辞書/総当たり試行</text>
  <text class="b" x="130" y="280">3. 一致候補抽出</text>
  <text class="b" x="130" y="320">防御: Argon2, ソルト, 高コスト設定</text>

  <rect class="box" x="630" y="140" width="480" height="320" rx="14"/>
  <text class="h" x="670" y="185">オンライン攻撃</text>
  <text class="b" x="670" y="220">1. 認証APIへ連続試行</text>
  <text class="b" x="670" y="250">2. 分散IPで回避試行</text>
  <text class="b" x="670" y="280">3. 成功まで反復</text>
  <text class="b" x="670" y="320">防御: レート制限, 通知, 監査</text>

  <text class="b" x="92" y="525">オフラインとオンラインでは防御配置が異なるため、同じ対策で両方を防ぐ設計は難しい。</text>
</svg>
