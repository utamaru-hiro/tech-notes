<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="t d">
  <title id="t">ソルトとペッパーの配置</title>
  <desc id="d">DB保存のソルトと秘密管理側のペッパーを分離して扱う構成図。</desc>
  <defs>
    <style>
      .bg{fill:#f9f2e4}.title{font:700 28px 'Hiragino Sans','Yu Gothic',sans-serif;fill:#3d2d00}
      .box{fill:#fffdf8;stroke:#c9a24a;stroke-width:2}.salt{fill:#eef4ff;stroke:#6f91c8}.pep{fill:#edf8ed;stroke:#78a878}
      .h{font:700 18px 'Hiragino Sans','Yu Gothic',sans-serif;fill:#3d2d00}.b{font:500 15px 'Hiragino Sans','Yu Gothic',sans-serif;fill:#4d4638}
      .line{stroke:#a67a19;stroke-width:3;fill:none;marker-end:url(#m)}
    </style>
    <marker id="m" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a67a19"/>
    </marker>
  </defs>

  <rect class="bg" width="1200" height="520"/>
  <text class="title" x="48" y="58">パスワード保護の二層防御</text>

  <rect class="box" x="90" y="170" width="230" height="130" rx="12"/>
  <text class="h" x="135" y="220">ユーザ入力</text>
  <text class="b" x="120" y="248">password</text>

  <rect class="box salt" x="380" y="150" width="250" height="170" rx="12"/>
  <text class="h" x="460" y="200">ソルト</text>
  <text class="b" x="420" y="228">ユーザ毎に異なる公開値</text>
  <text class="b" x="420" y="256">DB側に保存</text>

  <rect class="box pep" x="690" y="150" width="250" height="170" rx="12"/>
  <text class="h" x="770" y="200">ペッパー</text>
  <text class="b" x="735" y="228">アプリ秘密管理で保持</text>
  <text class="b" x="740" y="256">DBとは分離保管</text>

  <rect class="box" x="980" y="170" width="150" height="130" rx="12"/>
  <text class="h" x="1015" y="220">ハッシュ</text>
  <text class="b" x="1000" y="248">保存値</text>

  <path class="line" d="M320 235 H380"/>
  <path class="line" d="M630 235 H690"/>
  <path class="line" d="M940 235 H980"/>

  <text class="b" x="94" y="400">ソルトは同一パスワードの横断解析を防ぎ、ペッパーはDB漏えい時のオフライン解析コストを上げる。</text>
  <text class="b" x="94" y="430">役割が異なるため、両方を併用して防御層を分離する設計が推奨される。</text>
</svg>
