<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="t d">
  <title id="t">メール暗号の信頼モデル比較</title>
  <desc id="d">OpenPGPのWeb of TrustとS/MIMEのCAモデルを対比する図。</desc>
  <defs>
    <style>
      .bg{fill:#f9f2e4}.ttl{font:700 28px 'Hiragino Sans','Yu Gothic',sans-serif;fill:#3d2d00}
      .left{fill:#eef4ff;stroke:#6f91c8;stroke-width:2}.right{fill:#edf8ed;stroke:#78a878;stroke-width:2}
      .h{font:700 17px 'Hiragino Sans','Yu Gothic',sans-serif;fill:#3d2d00}.b{font:500 14px 'Hiragino Sans','Yu Gothic',sans-serif;fill:#4d4638}
      .ln{stroke:#a67a19;stroke-width:2.5}
    </style>
  </defs>
  <rect class="bg" width="1200" height="560"/>
  <text class="ttl" x="48" y="58">メール暗号の信頼モデル</text>

  <rect class="left" x="90" y="120" width="500" height="360" rx="14"/>
  <text class="h" x="130" y="165">OpenPGP / Web of Trust</text>
  <circle cx="220" cy="250" r="26" fill="#fff" stroke="#6f91c8"/>
  <circle cx="320" cy="210" r="26" fill="#fff" stroke="#6f91c8"/>
  <circle cx="420" cy="260" r="26" fill="#fff" stroke="#6f91c8"/>
  <circle cx="300" cy="320" r="26" fill="#fff" stroke="#6f91c8"/>
  <line class="ln" x1="220" y1="250" x2="320" y2="210"/>
  <line class="ln" x1="320" y1="210" x2="420" y2="260"/>
  <line class="ln" x1="220" y1="250" x2="300" y2="320"/>
  <line class="ln" x1="300" y1="320" x2="420" y2="260"/>
  <text class="b" x="130" y="400">分散的で柔軟だが、運用教育負荷が高い</text>

  <rect class="right" x="610" y="120" width="500" height="360" rx="14"/>
  <text class="h" x="650" y="165">S/MIME / CAモデル</text>
  <rect x="800" y="205" width="120" height="40" fill="#fff" stroke="#78a878"/>
  <text class="b" x="838" y="231">CA</text>
  <rect x="680" y="305" width="120" height="40" fill="#fff" stroke="#78a878"/>
  <rect x="920" y="305" width="120" height="40" fill="#fff" stroke="#78a878"/>
  <text class="b" x="707" y="331">利用者A</text>
  <text class="b" x="947" y="331">利用者B</text>
  <line class="ln" x1="860" y1="245" x2="740" y2="305"/>
  <line class="ln" x1="860" y1="245" x2="980" y2="305"/>
  <text class="b" x="650" y="400">統制しやすいが、証明書運用負荷が高い</text>

  <text class="b" x="92" y="525">導入難易度は暗号方式の違いより、信頼モデルに合わせた鍵配布と失効運用の整備度で決まる。</text>
</svg>
